# Updated: 2026-02-23
services:
  dev-worker:
    build: .
    container_name: dev-worker-node
    ports:
      - "5100:8080"
    volumes:
      - dev-worker-data:/app/data
      - dev-worker-projects:/app/projects
      - dev-worker-workspaces:/app/workspaces
      # CLI agent credentials (mount from host after authenticating locally)
      - /home/github-runner/.codex:/root/.codex
      - /home/github-runner/.gemini:/root/.gemini
      - /home/github-runner/.claude:/root/.claude
      - /home/github-runner/.claude.json:/root/.claude.json
    env_file:
      - .env
    restart: unless-stopped

volumes:
  dev-worker-data:
  dev-worker-projects:
  dev-worker-workspaces:
