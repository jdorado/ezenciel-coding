name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, dev-worker]

    steps:
      - name: Clean root-owned dirs
        run: |
          # The previous container may still be running with volumes mounted,
          # preventing the deletion of host directories.
          docker-compose down || true
          docker ps -q | xargs -r docker rm -f || true
          sudo rm -rf workspaces projects || true
          docker run --rm -v "$PWD:/work" alpine sh -c "rm -rf /work/workspaces /work/projects" || true
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove old images
        run: docker image prune -f

      - name: Build image
        run: docker-compose build

      - name: Run containers
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${API_KEY}" ]; then
            echo "API_KEY=${API_KEY}" > .env
          fi
          docker-compose up -d

      - name: Verify CLI agents
        run: |
          set -euo pipefail
          docker exec dev-worker-node sh -lc '
            set -eu
            command -v codex && codex --version
            command -v gemini && gemini --version
            command -v claude && claude --version
            command -v gh && gh --version | head -n1
            command -v git && git --version
          '

      - name: Verify deployment
        run: |
          set -euo pipefail
          for _ in 1 2 3 4 5 6; do
            if docker ps | grep -q dev-worker-node; then
              docker ps --filter name=dev-worker-node
              exit 0
            fi
            sleep 5
          done
          docker-compose logs || true
          exit 1
