# Updated: 2026-02-25
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, dev-worker]

    steps:
      - name: Clean workspace
        run: |
          docker-compose down || true
          sudo rm -rf workspaces projects || true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove old images
        run: docker image prune -f

      - name: Build image
        env:
          DOCKER_CONFIG: /tmp/.docker
          HOME: /tmp
        run: |
          mkdir -p /tmp/.docker/buildx
          docker-compose build

      - name: Run containers
        env:
          API_KEY: ${{ secrets.API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          set -euo pipefail
          : > .env
          if [ -n "${API_KEY:-}" ]; then
            echo "API_KEY=${API_KEY}" >> .env
          fi
          if [ -n "${MONGODB_URI:-}" ]; then
            echo "MONGODB_URI=${MONGODB_URI}" >> .env
          fi
          docker-compose up -d

      - name: Verify CLI agents
        run: |
          set -euo pipefail
          docker exec -e HOME=/tmp dev-worker-node sh -lc '
            set -eu
            command -v codex && codex --version
            command -v gemini && gemini --version
            if command -v claude >/dev/null; then timeout 20s claude --version || true; fi
            command -v gh && gh --version | head -n1
            command -v git && git --version
          '

      - name: Verify deployment
        run: |
          set -euo pipefail
          for _ in 1 2 3 4 5 6; do
            if docker ps | grep -q dev-worker-node; then
              docker ps --filter name=dev-worker-node
              exit 0
            fi
            sleep 5
          done
          docker-compose logs || true
          exit 1
